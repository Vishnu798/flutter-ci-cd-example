name: Distribute to Firebase App Distribution

on:
  push:
    branches:
      - test
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Clone repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.44.1'

      - name: Get Flutter packages
        run: flutter pub get

      - name: Run static analysis
        run: flutter analyze

      - name: Run tests
        run: flutter test

  distribute:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Clone repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: "17.0.12"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.44.1'

      - name: Get Flutter packages
        run: flutter pub get

      - name: Build release APK
        run: flutter build apk --release

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true
          working-directory: android

      - name: Write Firebase service account key
        env:
          FIREBASE_SERVICE_ACCOUNT_KEY: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_KEY }}
        run: echo "$FIREBASE_SERVICE_ACCOUNT_KEY" > /tmp/firebase-service-account.json

      - name: Distribute to Firebase App Distribution
        env:
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/firebase-service-account.json
        run: |
          cd android
          bundle exec fastlane distribute

  notify:
    name: Notify QA Team
    needs: distribute
    runs-on: ubuntu-latest
    if: success()
    steps:
      - name: Send email to QA team
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "New Build Available for QA - ${{ github.repository }} (${{ github.ref_name }})"
          to: ${{ secrets.QA_TEAM_EMAILS }}
          cc: ${{ secrets.CC_EMAILS }}
          from: Build Bot <${{ secrets.MAIL_USERNAME }}>
          body: |
            Hi Team,

            A new build has been successfully distributed via Firebase App Distribution.

            Branch       : ${{ github.ref_name }}
            Commit       : ${{ github.sha }}
            Triggered by : ${{ github.actor }}
            Workflow run : ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

            Please check your Firebase App Distribution invite/email to download and test the build.

            Release Notes: Lots of amazing new features to test out!

            Thanks,
            CI/CD Bot
